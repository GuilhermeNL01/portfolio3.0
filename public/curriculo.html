<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Currículo | Guilherme Lobo</title>
    <style>
      :root {
        color-scheme: light dark;
        background: #131311;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background: #131311;
        color: #C5DCDC;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      object {
        display: block;
        width: 100%;
        height: 100vh;
        border: 0;
      }

      .fallback {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        text-align: center;
      }

      .fallback p {
        max-width: 36rem;
        margin: 0;
        color: #C5DCDC;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <object
      data="/misc/GuilhermeLobo_CV.pdf#toolbar=0&navpanes=0&scrollbar=1"
      type="application/pdf"
      aria-label="Currículo de Guilherme Lobo em PDF"
    >
      <div class="fallback">
        <div>
          <p>Seu navegador não conseguiu exibir o currículo embutido nesta página.</p>
        </div>
      </div>
    </object>
  </body>
</html>
